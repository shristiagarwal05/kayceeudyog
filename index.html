<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaycee Udyog</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-neutral-50 flex flex-col">

  <!-- Login Screen -->
  <div id="loginScreen" class="flex-1 flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">
      <h2 class="text-xl text-neutral-900 mb-4">Employee Login</h2>
      <input id="usernameInput" type="text" placeholder="Employee name"
        class="w-full px-4 py-3 border border-neutral-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-neutral-900" />
      <input id="passwordInput" type="password" placeholder="Password"
        class="w-full px-4 py-3 border border-neutral-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-neutral-900" />
      <button onclick="checkLogin()"
        class="w-full bg-neutral-900 text-white py-3 rounded-lg hover:bg-neutral-700 transition">Login</button>
      <p id="loginError" class="text-red-600 text-sm mt-2 hidden">Invalid name or password</p>
    </div>
  </div>

  <!-- Main Content (hidden until login) -->
  <div id="mainContent" class="hidden flex-1 flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-neutral-200">
      <div class="max-w-7xl mx-auto px-4 py-4">
        <h1 class="text-xl text-neutral-900">Kaycee Udyog</h1>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-start justify-center px-4 pt-20 md:pt-32">
      <div class="w-full max-w-md">
        <div class="mb-8">
          <h2 class="text-2xl text-neutral-900 tracking-tight">Search Product</h2>
        </div>

        <!-- Search Input + Clear Button -->
        <div class="mb-6 flex space-x-2">
          <input
            id="searchInput"
            type="text"
            placeholder="Enter product keyword + size (e.g. chicken 3)"
            class="flex-1 px-5 py-4 text-base bg-white border border-neutral-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent transition-shadow placeholder:text-neutral-400"
          />
          <button
            id="clearBtn"
            class="px-4 py-2 bg-neutral-200 text-neutral-700 rounded-xl hover:bg-neutral-300 transition"
          >
            Clear
          </button>
        </div>

        <div id="resultContainer"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-neutral-200 mt-auto">
      <div class="max-w-7xl mx-auto px-4 py-6">
        <p class="text-sm text-neutral-500 text-center">© 2026 Kaycee Udyog</p>
      </div>
    </footer>
  </div>

  <script>
    // ✅ Allowed employees
    const EMPLOYEES = ["siddarth", "shristi"];

    function checkLogin() {
      const nameInput = document.getElementById("usernameInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();

      // ✅ Employee name case-insensitive
      const name = nameInput.toLowerCase();

      // Password rule: first 4 letters of lowercase name + "_123"
      const expectedPassword = name.slice(0,4) + "_123";

      if (EMPLOYEES.includes(name) && pass === expectedPassword) {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("mainContent").classList.remove("hidden");
        loadProducts(); // only load after successful login
      } else {
        document.getElementById("loginError").classList.remove("hidden");
      }
    }

    let products = [];

    async function loadProducts() {
      // ✅ Use your published CSV link
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrmYy3WKlRKGnozK9eoC2UE-vO_XTA0FU02bAff2kkiP2phzODk7kHyxf9eX_ZwaLvVVXTfiKL5Gm4/pub?output=csv";
      const response = await fetch(url);
      const text = await response.text();

      // Split CSV into rows
      const rows = text.split("\n").map(r => r.split(","));

      // ✅ Robust parsing: skip header, ignore blank rows, strip quotes, remove trailing commas
      products = rows.slice(1)
        .filter(row => row[0]) // only keep rows with Item name
        .map(row => {
          const clean = (val) => (val || "")
            .replace(/^"|"$/g, '')   // remove wrapping quotes
            .replace(/""/g,'"')      // fix doubled quotes
            .trim();

          return {
            name: clean(row[0]),
            packing: clean(row[1]),
            mrp: clean(row[2]),
            // ✅ Only take the first non-empty value after column 3
            price: clean(row.slice(3).find(v => v && v.trim()))
          };
        });

      console.log("Loaded products:", products);
    }

    function normalize(str) {
      return str.toLowerCase().replace(/[^a-z0-9 ]/g, " ");
    }

    function handleSearch(value) {
      const query = normalize(value.trim());
      const resultContainer = document.getElementById('resultContainer');
      resultContainer.innerHTML = '';

      if (!query) return;

      const searchTerms = query.split(/\s+/).filter(Boolean);

      // ✅ Search across both name and packing fields
      const matches = products.filter(product => {
        const productText = normalize(product.name + " " + product.packing);
        return searchTerms.every(term => productText.includes(term));
      });

      if (matches.length > 0) {
        resultContainer.innerHTML = matches.map(p => `
          <div class="bg-white rounded-xl p-6 shadow-sm border border-neutral-100 mb-4">
            <h3 class="text-base text-neutral-900">${p.name}</h3>
            <p class="text-sm text-neutral-500 mt-1">${p.packing}</p>
            <div class="text-sm text-neutral-600">MRP: ₹${p.mrp}</div>
            <div class="text-2xl text-neutral-900">Selling Price: ₹${p.price}</div>
          </div>
        `).join('');
      } else {
        resultContainer.innerHTML = `<div class="text-center py-8"><p class="text-sm text-neutral-400">No result</p></div>`;
      }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => handleSearch(e.target.value));
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('resultContainer').innerHTML = '';
      document.getElementById('searchInput').focus();
    });

    function setExample(example) {
      document.getElementById('searchInput').value = example;
      handleSearch(example);
    }
  </script>
</body>
</html>
